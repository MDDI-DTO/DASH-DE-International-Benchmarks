.ov-imd-chart .barchart:not(.barchart-scroll){justify-content:space-between;gap:0;}
.ov-imd-chart .barchart:not(.barchart-scroll) .bar-row{flex:0 0 auto;}
.ov-imd-chart .barchart .bar-track{height:24px;}
.ov-imd-chart .barchart.barchart-scroll{overflow-y:auto;gap:0;justify-content:flex-start;
  scrollbar-width:thin;scrollbar-color:rgba(16,40,64,0.25) transparent;}
.ov-imd-chart .barchart.barchart-scroll .bar-row{flex:0 0 34px;height:34px;}
.ov-imd-chart .barchart.barchart-scroll::-webkit-scrollbar{width:7px;}
.ov-imd-chart .barchart.barchart-scroll::-webkit-scrollbar-thumb{background:rgba(16,40,64,0.22);border-radius:6px;}
.ov-imd-chart .barchart.barchart-scroll::-webkit-scrollbar-track{background:transparent;}

/* global page footer (lives at the end of the scrollable .site) */
.ov-imd-foot{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
  padding:16px 0 20px;margin-top:14px;border-top:0.5px solid var(--color-border-2);}
.ov-imd-foot-class{grid-column:2;text-align:center;font-size:12px;font-weight:600;
  color:var(--color-text-primary);letter-spacing:0.01em;}
.ov-imd-foot-updated{grid-column:3;text-align:right;font-size:11px;color:var(--color-text-secondary);
  font-weight:500;font-variant-numeric:tabular-nums;}

/* ============================================================
   OVERALL – NRI (Level-1 summary) + NRI pillar deep-dive pages.
   Reuse the Overall – IMD internal-scroll canvas (sticky top bar +
   Level 0/1/2 nav). The .canvas-nri2 modifier adds comfortable
   NRI-scale spacing and a bespoke two-column profile/table grid that
   avoids the compressed .panel-row.grow IMD-pillar scale.
   ============================================================ */
/* stack the page's top-level panels (header card, filter, chart, grid, footer) */
.canvas-nri2 .site > .panel{margin-bottom:14px;}
.canvas-nri2 .site > .nri2-grid{margin-bottom:14px;}
.canvas-nri2 .site > .ov-imd-foot{margin-top:14px;}

/* main-card sub-pillar rank tags (pill style shared with the NRI mini cards) */
.nri2-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;}

/* two-column: sub-pillar rank profile + sub-indicators table */
.canvas-nri2 .nri2-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
@media(max-width:980px){.canvas-nri2 .nri2-grid{grid-template-columns:1fr;}}
.canvas-nri2 .nri2-grid > .panel{display:flex;flex-direction:column;height:560px;overflow:hidden;min-width:0;}
.canvas-nri2 .nri2-grid > .panel > .panel-head{flex:0 0 auto;}
.canvas-nri2 .nri2-grid > .panel > .subtable-wrap{flex:1;min-height:0;overflow:auto;
  scrollbar-width:thin;scrollbar-color:rgba(16,40,64,0.25) transparent;}
.canvas-nri2 .nri2-grid > .panel > .panel-body{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;}
.canvas-nri2 .nri2-grid > .panel > .nri-matrix-wrap{flex:1;min-height:0;}
.canvas-nri2 .nri2-grid > .panel > .class-foot,
.canvas-nri2 .nri2-grid > .panel > .subtable-foot{flex:0 0 auto;}
/* drill-down bar chart inside the profile panel: fixed comfortable row thickness */
.canvas-nri2 .nri2-grid > .panel > .panel-body .barchart{flex:1;min-height:0;gap:0;}
.canvas-nri2 .nri2-grid > .panel > .panel-body .barchart.barchart-scroll{overflow-y:auto;justify-content:flex-start;}
.canvas-nri2 .nri2-grid > .panel > .panel-body .barchart .bar-row{flex:0 0 30px;height:30px;}
.canvas-nri2 .nri2-grid > .panel > .panel-body .barchart .bar-track{height:22px;}

/* ============================================================
   OVERVIEW — fluid full-viewport rebuild (A3 + B2…B12)
   The Overview tab opts out of the fixed 1440×900 scaled canvas:
   the canvas fills the viewport width (capped at 1920) and the
   compact publication cards reflow via CSS Grid auto-fit.
   ============================================================ */
.canvas.canvas-fluid{width:100%;max-width:1920px;height:100vh;margin:0 auto;transform:none!important;}
.canvas-fluid .topbar,.canvas-fluid .domain-tabs{flex:0 0 auto;}

/* responsive card grid — wraps 3-up / 2-up / 1-up by available width (B2).
   align-items:stretch so cards in the same row share the tallest one's height
   regardless of pillar count (Fix 5); the expand trigger pins to the card bottom. */
.ovx-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:16px;
  align-items:stretch;margin-bottom:8px;}

/* ---- card ---- */
.ovx-card{position:relative;display:flex;flex-direction:column;background:var(--panel);
  border:0.5px solid var(--color-border-tertiary);border-radius:10px;padding:18px 20px 14px;
  overflow:hidden;box-shadow:0 1px 2px rgba(16,40,64,0.04);}
.ovx-accent{position:absolute;left:0;top:0;bottom:0;width:3px;}
.ovx-title{font-size:16px;font-weight:700;line-height:1.3;color:var(--color-text-primary);
  letter-spacing:-0.01em;text-wrap:pretty;}
/* B4 — source line directly below the title */
.ovx-src{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:6px;
  font-size:11.5px;color:var(--color-text-tertiary);}
.ovx-src-link{font-weight:700;text-decoration:none;}
.ovx-src-link:hover{text-decoration:underline;text-underline-offset:2px;}
.ovx-src-sep{opacity:0.55;}

/* headline rank */
.ovx-overall{display:flex;align-items:center;gap:13px;margin-top:15px;padding-bottom:13px;
  border-bottom:0.5px solid var(--color-border-2);}
.ovx-overall-rank{font-size:33px;font-weight:800;line-height:0.95;color:var(--color-text-primary);
  letter-spacing:-0.025em;font-variant-numeric:tabular-nums;flex:0 0 auto;}
.ovx-overall-rank sup{font-size:15px;font-weight:700;margin-left:1px;}
.ovx-overall-meta{display:flex;flex-direction:column;gap:4px;padding-bottom:2px;}
.ovx-overall-label{font-size:11px;color:var(--color-text-tertiary);letter-spacing:0.01em;white-space:nowrap;}
.ovx-overall-arrow{min-height:17px;display:flex;align-items:center;}

/* B5 — shared pillar rows (aligned name | rank | YoY columns) */
.ovx-pillars{display:flex;flex-direction:column;margin-top:4px;margin-bottom:11px;}
.ovx-pr{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--color-border-2);}
.ovx-pr:last-child{border-bottom:none;}
.ovx-pr-name{flex:1 1 auto;min-width:0;display:flex;align-items:center;gap:6px;}
.ovx-pr-icon{font-size:13.5px;line-height:1;flex:0 0 auto;}
.ovx-pr-label{font-size:13.5px;color:var(--color-text-primary);font-weight:500;text-wrap:pretty;}
.ovx-pr-rank{flex:0 0 54px;text-align:right;font-size:15px;font-weight:700;letter-spacing:-0.01em;
  color:var(--color-text-primary);font-variant-numeric:tabular-nums;}
.ovx-pr-rank sup{font-size:9px;font-weight:600;margin-left:1px;}
.ovx-pr-yoy{flex:0 0 56px;display:flex;justify-content:flex-end;}

/* B8 — enlarged YoY arrows */
.ovx-yoy{display:inline-flex;align-items:center;gap:3px;font-size:17px;font-weight:700;line-height:1;
  font-variant-numeric:tabular-nums;}
.ovx-yoy i{font-size:12.5px;font-weight:700;font-style:normal;}
.ovx-yoy.up{color:var(--color-up);}
.ovx-yoy.down{color:var(--color-down);}
.ovx-yoy.flat{color:var(--color-neutral);font-size:14px;}

/* B6 — pillar definition tooltip */
.ovx-info{display:inline-flex;align-items:center;justify-content:center;color:var(--color-text-tertiary);
  cursor:pointer;flex:0 0 auto;line-height:0;border-radius:50%;transition:color .12s;}
.ovx-info:hover,.ovx-info:focus{color:var(--color-brand-blue);outline:none;}
.ovx-info svg{display:block;}
.ovx-tip{position:fixed;z-index:95;max-width:260px;background:#15233a;color:#fff;border-radius:8px;
  padding:9px 12px;font-size:11px;line-height:1.5;box-shadow:0 8px 26px rgba(12,40,64,0.3);
  pointer-events:none;text-wrap:pretty;}

/* B9 — expand disclosure. margin-top:auto pins it to the card bottom so triggers
   align across a stretched row (Fix 5); .ovx-pillars carries the gap above it. */
.ovx-expand{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;margin-top:auto;
  padding:10px 13px;border:0.5px solid #d8dde2;border-radius:8px;background:#eef1f4;
  cursor:pointer;font-family:var(--font);font-size:12px;font-weight:600;color:var(--color-text-secondary);
  transition:background .12s,border-color .12s;}
.ovx-expand:hover{background:#e7eaed;border-color:var(--color-border-secondary);}
.ovx-chev{width:15px;height:15px;stroke:currentColor;fill:none;transition:transform .2s;flex:0 0 auto;}
.ovx-expand.open .ovx-chev{transform:rotate(180deg);}

/* B10 + B12 — expanded panel */
.ovx-panel{margin-top:13px;display:flex;flex-direction:column;gap:14px;animation:ovxFade .18s ease;}
@keyframes ovxFade{from{opacity:0;transform:translateY(-3px);}to{opacity:1;transform:none;}}
/* Fix 1 — fixed-width badge column so the descriptive text starts at the same x for
   every badge; white fill + hairline border keeps badges distinct from the grey trigger. */
.ovx-badges{display:flex;flex-direction:column;gap:8px;}
.ovx-badge{display:grid;grid-template-columns:118px 1fr;align-items:start;gap:11px;
  background:#fff;border:0.5px solid #eceff2;border-radius:8px;padding:9px 12px;}
.ovx-badge-tag{justify-self:start;font-size:8.5px;font-weight:700;padding:3px 9px;border-radius:20px;border:0.5px solid;
  letter-spacing:0.02em;white-space:nowrap;text-transform:uppercase;margin-top:1px;text-align:center;}
.ovx-badge-txt{font-size:11.5px;line-height:1.5;color:var(--color-text-secondary);text-wrap:pretty;}
.ovx-badge.strength .ovx-badge-tag{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97;}
.ovx-badge.watch .ovx-badge-tag{background:#FEF3C7;color:#92400E;border-color:#F59E0B;}
.ovx-badge.trend .ovx-badge-tag{background:#E6F1FB;color:#0C447C;border-color:#B5D4F4;}

.ovx-chart{border:0.5px solid var(--color-border-tertiary);border-radius:9px;overflow:hidden;}
.ovx-chart-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;
  padding:12px 14px 10px;border-bottom:0.5px solid var(--color-border-2);}
.ovx-chart-titles{flex:1;min-width:0;}
.ovx-chart-title{font-size:12.5px;font-weight:600;color:var(--color-text-primary);text-wrap:pretty;}
.ovx-chart-sub{font-size:10.5px;color:var(--color-text-tertiary);margin-top:2px;}
.ovx-chart-legend{flex:0 0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:5px 12px;font-size:10px;
  color:var(--color-text-secondary);justify-content:flex-end;max-width:58%;}
.ovx-leg{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.ovx-leg-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
/* line / combo chart canvas wrapper (Fix 2) */
.ovx-chart-canvas{position:relative;width:100%;}
.ovx-chart-canvas .ov-canvas-wrap{position:absolute;inset:8px 12px 4px;flex:none;}
.ovx-chart-fallback{padding:34px 16px;text-align:center;font-size:11px;color:var(--color-text-tertiary);}
/* B12 — rank ordinal on the left · pillar name on the bar · no flag icon */
.ovx-bars{display:flex;flex-direction:column;gap:7px;padding:13px 14px;}
.ovx-bar-row{display:flex;align-items:center;gap:11px;}
.ovx-bar-rank{flex:0 0 38px;text-align:right;font-size:12px;font-weight:700;color:var(--color-text-secondary);
  font-variant-numeric:tabular-nums;}
.ovx-bar-rank sup{font-size:8px;font-weight:600;margin-left:1px;}
.ovx-bar-track{flex:1;position:relative;height:30px;background:rgba(16,40,64,0.05);border-radius:6px;min-width:0;}
.ovx-bar-fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;
  transition:width .5s cubic-bezier(.4,0,.2,1);}
.ovx-bar-name{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:600;
  color:#fff;white-space:nowrap;z-index:2;text-shadow:0 1px 2px rgba(0,0,0,0.5);pointer-events:none;}
.ovx-bar-name.out{color:var(--color-text-primary);text-shadow:none;font-weight:500;}
.ovx-chart-foot{padding:8px 14px;border-top:0.5px solid var(--color-border-2);font-size:9px;
  color:var(--color-text-tertiary);text-align:right;font-variant-numeric:tabular-nums;}

</style>
</head>
